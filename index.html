        const pembayaran = [

    initMockDb();

    // --- ICON MAP FOR INLINE CDN LOADING ---
    const Icon = ({ name, size = 18, className = "" }) => {
      useEffect(() => {
        if (window.lucide) {
          window.lucide.createIcons();
        }
      }, [name]);
      return <i data-lucide={name} style={{ width: size, height: size }} className={`inline-block ${className}`} />;
    };

    // --- MAIN APP COMPONENT ---
    function App() {
      const [user, setUser] = useState(null);
      const [view, setView] = useState('login'); // 'login', 'register', 'dashboard', 'pendidikan', 'keamanan', 'keuangan', 'profil'
      const [selectedStudentId, setSelectedStudentId] = useState(''); // Untuk admin melihat profil/nilai santri tertentu
      const [successMsg, setSuccessMsg] = useState('');
      const [errorMsg, setErrorMsg] = useState('');
      const [showNotif, setShowNotif] = useState(false);
      const [refreshKey, setRefreshKey] = useState(0);

      const pendingUsers = user?.role === 'ADMIN' ? getDb('mock_users').filter(u => u.status === 'PENDING') : [];
      const pendingUsersCount = pendingUsers.length;

      const handleAcceptRegistration = (id) => {
        let users = getDb('mock_users');
        const idx = users.findIndex(u => u.id === id);
        if (idx > -1) {
          users[idx].status = 'ACTIVE';
          saveDb('mock_users', users);
          setRefreshKey(prev => prev + 1);
        }
      };

      const handleRejectRegistration = (id) => {
        let users = getDb('mock_users').filter(u => u.id !== id);
        saveDb('mock_users', users);
        setRefreshKey(prev => prev + 1);
      };

      useEffect(() => {
        const logged = localStorage.getItem('simesra_logged_user');
        if (logged) {
          const parsedUser = JSON.parse(logged);
          setUser(parsedUser);
          setView('dashboard');
        }
      }, []);

      const handleLogin = (email, password) => {
        setErrorMsg('');
        const users = getDb('mock_users');
        const found = users.find(u => u.email === email && u.password === password);
        if (!found) {
          setErrorMsg('Email atau password salah');
          return;
        }
        if (found.status === 'PENDING') {
          setErrorMsg('Akun Anda belum aktif. Hubungi Admin pengurus pesantren.');
          return;
        }
        setUser(found);
        localStorage.setItem('simesra_logged_user', JSON.stringify(found));
        setView('dashboard');
      };

      const handleLogout = () => {
        localStorage.removeItem('simesra_logged_user');
        setUser(null);
        setView('login');
      };

      const handleRegister = (formData) => {
        setErrorMsg('');
        const users = getDb('mock_users');
        if (users.some(u => u.email === formData.email)) {
          setErrorMsg('Email sudah terdaftar');
          return false;
        }
        const newUser = {
          id: Date.now(),
          ...formData,
          role: 'SANTRI',
          status: 'PENDING'
        };
        users.push(newUser);
        saveDb('mock_users', users);
        return true;
      };

      return (
        <div className="min-h-screen bg-slate-50 flex flex-col">
          {view === 'login' && (
            <LoginView 
              onLogin={handleLogin} 
              onGoRegister={() => setView('register')} 
              error={errorMsg}
              success={successMsg}
              clearAlerts={() => { setSuccessMsg(''); setErrorMsg(''); }}
            />
          )}
          {view === 'register' && (
            <RegisterView 
              onRegister={handleRegister} 
              onGoLogin={() => setView('login')} 
              error={errorMsg}
            />
          )}

          {user && view !== 'login' && view !== 'register' && (
            <div className="flex-1 flex flex-col md:flex-row">
              <SidebarView 
                user={user} 
                currentView={view} 
                setView={(v) => { setView(v); setSelectedStudentId(''); }} 
                onLogout={handleLogout} 
              />

              {/* MAIN CONTENT AREA */}

                <header className="hidden md:flex bg-white border-b border-slate-200 h-16 items-center px-8 justify-between shadow-sm no-print">
                  <div className="flex items-center space-x-2 text-sm text-slate-500 font-bold uppercase tracking-wider text-emerald-800">
                    Sistem Informasi Manajemen Pesantren Miftahul Huda As-Syadzili
                  </div>
                  <div className="text-xs text-slate-400 font-medium flex items-center space-x-4">
                    {user.role === 'ADMIN' && (
                       <div className="relative">
                         <div className="cursor-pointer flex items-center justify-center p-2 rounded-full hover:bg-slate-100 transition" onClick={() => setShowNotif(!showNotif)} title="Notifikasi Pendaftaran">
                           <Icon name="bell" size={18} className="text-slate-600" />
                           {pendingUsersCount > 0 && (
                             <span className="absolute top-0 right-0 bg-rose-500 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full border-2 border-white animate-pulse">{pendingUsersCount}</span>
                           )}
                         </div>

                         {/* NOTIFICATION MODAL */}
                         {showNotif && (
                           <div className="absolute top-12 right-0 w-80 bg-white rounded-xl shadow-2xl border border-slate-200 z-50 overflow-hidden text-slate-800">
                             <div className="bg-slate-50 border-b border-slate-100 p-3 font-bold text-xs flex justify-between items-center">
                               <span>Persetujuan Akun Santri Baru</span>
                               <span className="bg-rose-100 text-rose-700 px-2 py-0.5 rounded-full text-[10px]">{pendingUsersCount} Pending</span>
                             </div>
                             <div className="max-h-80 overflow-y-auto">
                               {pendingUsersCount === 0 ? (
                                 <div className="p-6 text-center text-xs text-slate-500">Tidak ada pendaftaran baru.</div>
                               ) : (
                                 pendingUsers.map(p => (
                                   <div key={p.id} className="p-3 border-b border-slate-100 hover:bg-slate-50 transition">
                                     <div className="font-bold text-xs">{p.nama}</div>
                                     <div className="text-[10px] text-slate-500 mb-2">{p.email} • {p.noHp}</div>
                                     <div className="flex space-x-2">
                                       <button onClick={() => handleAcceptRegistration(p.id)} className="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white text-[10px] font-bold py-1.5 rounded transition">Terima</button>
                                       <button onClick={() => handleRejectRegistration(p.id)} className="flex-1 bg-rose-500 hover:bg-rose-600 text-white text-[10px] font-bold py-1.5 rounded transition">Tolak</button>
                                     </div>
                                   </div>
                                 ))
                               )}
                             </div>
                           </div>
                         )}
                       </div>
                    )}
                    <div className="flex items-center space-x-2 border-l border-slate-200 pl-4">
                      <span>Mode Demo (Local Database)</span>
                      <span className="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.8)]"></span>
                    </div>
                  </div>
                </header>

                <main className="flex-1 p-4 md:p-8 overflow-y-auto" onClick={() => showNotif && setShowNotif(false)}>
                  {view === 'dashboard' && (
                    <DashboardView 
                      key={`dash-${refreshKey}`}
                      user={user} 
                      setView={setView} 
                      setSelectedStudentId={(id) => {
                        setSelectedStudentId(id);
                        setView('profil');
                      }} 
                    />
                  )}
                  {view === 'pendidikan' && (
                    <PendidikanView 
                      user={user} 
                      selectedStudentId={selectedStudentId} 
                      setSelectedStudentId={setSelectedStudentId}
                    />
                  )}
                  {view === 'keamanan' && (
                    <KeamananView 
                      user={user} 
                      selectedStudentId={selectedStudentId} 
                      setSelectedStudentId={setSelectedStudentId}
                    />
                  )}
                  {view === 'keuangan' && (
                    <KeuanganView 
                      user={user} 
                      selectedStudentId={selectedStudentId} 
                      setSelectedStudentId={setSelectedStudentId}
                    />
                  )}
                  {view === 'profil' && (
                    <ProfilView 
                      user={user} 
                      targetUserId={selectedStudentId || user.id} 
                      clearTargetId={() => setSelectedStudentId('')} 
                    />
                  )}
                  {view === 'buat-akun' && (
                    <BuatAkunView 
                      onSuccess={() => {
                        setRefreshKey(prev => prev + 1);
                        setView('dashboard');
                      }} 
                    />
                  )}
                </main>
              </div>
            </div>
          )}
        </div>
      );
    }

    // --- VIEW: LOGIN ---
    function LoginView({ onLogin, onGoRegister, error, success, clearAlerts }) {
      const [email, setEmail] = useState('admin@pesantren.com');
      const [password, setPassword] = useState('adminpassword');
      const [role, setRole] = useState('ADMIN');

      const handleSubmit = (e) => {
        e.preventDefault();
        onLogin(email, password);
      };

      return (
        <div className="min-h-screen flex items-center justify-center bg-gradient-to-tr from-[#021c15] via-[#043327] to-[#01140f] p-4 relative overflow-hidden">
          <div className="w-full max-w-md bg-white/95 rounded-3xl shadow-2xl overflow-hidden border border-white/20 relative">
            <div className="h-1.5 bg-gradient-to-r from-[#bf953f] via-[#fcf6ba] to-[#b38728]"></div>
            <div className="p-8">
              <div className="text-center mb-6">
                <img src="./logo.png" className="mx-auto w-20 h-20 object-contain mb-3" alt="Logo" />
                <h2 className="text-2xl font-extrabold font-serif text-slate-900 tracking-tight">SIM Pesantren</h2>
                <h3 className="text-sm font-bold text-emerald-800 mt-1 mb-1">MIFTAHUL HUDA AS-SYADZILI</h3>
                <p className="text-xs text-slate-500 mt-1">Sistem Informasi Manajemen & Akademik Pesantren</p>
              </div>

              <div className="flex bg-slate-100 p-1 rounded-xl mb-6 border border-slate-200">
                <button
                  type="button"
                  onClick={() => {
                    setRole('ADMIN');
                    setEmail('admin@pesantren.com');
                    setPassword('adminpassword');
                    clearAlerts();
                  }}
                  className={`flex-1 py-2.5 rounded-xl text-xs font-bold transition-all duration-200 ${
                    role === 'ADMIN' ? 'bg-white text-[#0d5c46] shadow-sm border-b-2 border-[#bf953f]' : 'text-slate-550 hover:text-slate-800'
                  }`}
                >
                  Server (Admin)
                </button>
                <button
                  type="button"
                  onClick={() => {
                    setRole('SANTRI');
                    setEmail('ahmad@pesantren.com');
                    setPassword('studentpassword');
                    clearAlerts();
                  }}
                  className={`flex-1 py-2.5 rounded-xl text-xs font-bold transition-all duration-200 ${
                    role === 'SANTRI' ? 'bg-white text-[#0d5c46] shadow-sm border-b-2 border-[#bf953f]' : 'text-slate-550 hover:text-slate-800'
                  }`}
                >
                  User (Santri/Wali)
                </button>
              </div>

              {error && <div className="bg-rose-50 border-l-4 border-rose-500 text-rose-800 p-3 rounded-lg text-xs font-medium mb-4">{error}</div>}
              {success && <div className="bg-emerald-50 border-l-4 border-emerald-500 text-emerald-800 p-3 rounded-lg text-xs font-medium mb-4">{success}</div>}

              <form onSubmit={handleSubmit} className="space-y-4">
                <div>
                  <label className="block text-[10px] font-bold text-slate-700 uppercase tracking-wider mb-1">Email</label>
                  <input
                    type="email"
                    value={email}
                    onChange={(e) => setEmail(e.target.value)}
                    className="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 text-xs outline-none focus:border-emerald-500 focus:bg-white transition"
                    required
                  />
                </div>
                <div>
                  <label className="block text-[10px] font-bold text-slate-700 uppercase tracking-wider mb-1">Kata Sandi</label>
                  <input
                    type="password"
                    value={password}
                    onChange={(e) => setPassword(e.target.value)}
                    className="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 px-4 text-xs outline-none focus:border-emerald-500 focus:bg-white transition"
                    required
                  />
                </div>
                <button type="submit" className="w-full bg-gradient-to-r from-[#0d5c46] to-[#063c2e] hover:from-[#094c39] hover:to-[#042c21] text-white rounded-xl py-3 font-bold text-xs transition shadow-lg shadow-emerald-950/20 border border-[#bf953f]/20">
                  Masuk Aplikasi
                </button>
              </form>

              <div className="mt-6 text-center text-xs text-slate-500">
                Belum punya akun santri?{' '}
                <button onClick={onGoRegister} className="text-emerald-600 font-bold hover:underline">
                  Daftar Mandiri Disini
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // --- VIEW: REGISTER ---
    function RegisterView({ onRegister, onGoLogin, error }) {
      const [formData, setFormData] = useState({
        nama: '',
        email: '',
        noHp: '',
        namaWali: '',
        alamat: '',
        kelas: '',
        password: ''
      });
      const [formError, setFormError] = useState('');
      const [showModal, setShowModal] = useState(false);

      const handleSubmit = (e) => {
        e.preventDefault();
        setFormError('');
        const { noHp } = formData;
        const numeric = /^[0-9]+$/;
        if (!numeric.test(noHp)) {
          setFormError('Nomor HP harus berupa angka saja (contoh: 08123456789)');
          return;
        }
        const success = onRegister(formData);
        if (success) {
          setShowModal(true);
        }
      };

      return (

    function DashboardView({ user, setView, setSelectedStudentId }) {
      const [stats, setStats] = useState({});
      const [santriList, setSantriList] = useState([]);
      const [search, setSearch] = useState('');
      const [filterKelas, setFilterKelas] = useState('');
      const [editingSantri, setEditingSantri] = useState(null);
      const [editForm, setEditForm] = useState({ id: '', nama: '', kelas: '', namaWali: '', noHp: '' });

      const openEditModal = (santri) => {
        setEditingSantri(santri);
        setEditForm({
          id: santri.id,
          nama: santri.nama || '',
          kelas: santri.kelas || '',
          namaWali: santri.namaWali || '',
          noHp: santri.noHp || ''
        });
      };

      const handleSaveEdit = (e) => {
        e.preventDefault();
        let users = getDb('mock_users');
        const idx = users.findIndex(u => u.id === editForm.id);
        if (idx !== -1) {
          users[idx] = {
            ...users[idx],
            nama: editForm.nama,
            kelas: editForm.kelas,
            namaWali: editForm.namaWali,
            noHp: editForm.noHp
          };
          saveDb('mock_users', users);
          setEditingSantri(null);
          loadData();
        }
      };

      useEffect(() => {
        loadData();
      }, [search, filterKelas]);

      const loadData = () => {
        const users = getDb('mock_users');
        const santris = users.filter(u => u.role === 'SANTRI');
        const sanksi = getDb('mock_sanksi');
        const pbs = getDb('mock_pembayaran');
        const curM = new Date().getMonth() + 1;
        const curY = new Date().getFullYear();

        const lunasM = pbs.filter(p => p.bulan === curM && p.tahun === curY && p.status === 'LUNAS').length;

        const classes = {};
        santris.filter(u => u.status === 'ACTIVE').forEach(u => {
          const k = u.kelas || 'Belum Ditentukan';
          classes[k] = (classes[k] || 0) + 1;
        });
        const classChart = Object.keys(classes).map(k => ({ kelas: k, jumlah: classes[k] }));

        // Stats
        setStats({
          total: santris.length,
          aktif: santris.filter(u => u.status === 'ACTIVE').length,
          pending: santris.filter(u => u.status === 'PENDING').length,
          sanksi: sanksi.length,
          lunasThisMonth: lunasM,
          classChart
        });

        // Filter list
        let filtered = santris;
        if (search) {
          filtered = filtered.filter(u => 
            u.nama.toLowerCase().includes(search.toLowerCase()) || 
            (u.kelas && u.kelas.toLowerCase().includes(search.toLowerCase()))
          );
        }
        if (filterKelas) {
          filtered = filtered.filter(u => u.kelas === filterKelas);
        }
        setSantriList(filtered);
      };

      const handleVerify = (id) => {
        const users = getDb('mock_users');
        const idx = users.findIndex(u => u.id === id);
        if (idx !== -1) {
          users[idx].status = 'ACTIVE';
          saveDb('mock_users', users);
          loadData();
        }
      };

      const handleDelete = (id) => {
        if (!confirm('Hapus santri ini beserta seluruh riwayatnya?')) return;
        let users = getDb('mock_users').filter(u => u.id !== id);
        saveDb('mock_users', users);
        
        let nil = getDb('mock_nilai').filter(n => n.santriId !== id);
        saveDb('mock_nilai', nil);
        
        let san = getDb('mock_sanksi').filter(s => s.santriId !== id);
        saveDb('mock_sanksi', san);
        
        let pay = getDb('mock_pembayaran').filter(p => p.santriId !== id);

    // --- VIEW: PENDIDIKAN (NILAI) ---
    function PendidikanView({ user, selectedStudentId, setSelectedStudentId }) {
      const [nilai, setNilai] = useState([]);
      const [tahun, setTahun] = useState('2025/2026');
      const [sem, setSem] = useState('GANJIL');
      
      const [showModal, setShowModal] = useState(false);
      const [modalMode, setModalMode] = useState('ADD');
      const [editId, setEditId] = useState(null);
      const [form, setForm] = useState({ mataPelajaran: "Al-Qur'an & Tajwid", nilaiUts: '', nilaiUas: '' });

      const users = getDb('mock_users').filter(u => u.role === 'SANTRI' && u.status === 'ACTIVE');
      const curId = user.role === 'ADMIN' ? (selectedStudentId || (users[0]?.id || '')) : user.id;

      useEffect(() => {
        if (user.role === 'ADMIN' && users.length > 0 && !selectedStudentId) {
          setSelectedStudentId(users[0].id);
        }
      }, [users]);

      useEffect(() => {
        if (curId) {
          loadNilai();
        }
      }, [curId, tahun, sem]);

      const loadNilai = () => {
        const allNilai = getDb('mock_nilai');
        const filtered = allNilai.filter(n => n.santriId === parseInt(curId) && n.tahunAjaran === tahun && n.semester === sem);
        setNilai(filtered);
      };

      const handleSave = (e) => {
        e.preventDefault();
        const allNilai = getDb('mock_nilai');
        if (modalMode === 'ADD') {
          const record = {
            id: Date.now(),
            santriId: parseInt(curId),
            mataPelajaran: form.mataPelajaran,
            nilaiUts: parseFloat(form.nilaiUts),
            nilaiUas: parseFloat(form.nilaiUas),
            semester: sem,
            tahunAjaran: tahun
          };
          allNilai.push(record);
        } else {
          const idx = allNilai.findIndex(n => n.id === editId);
          if (idx !== -1) {
            allNilai[idx] = {
              ...allNilai[idx],
              mataPelajaran: form.mataPelajaran,
              nilaiUts: parseFloat(form.nilaiUts),
              nilaiUas: parseFloat(form.nilaiUas)
            };
          }
        }
        saveDb('mock_nilai', allNilai);
        setShowModal(false);
        loadNilai();
      };

      const handleDelete = (id) => {
        if (!confirm('Hapus nilai ini?')) return;
        const allNilai = getDb('mock_nilai').filter(n => n.id !== id);
        saveDb('mock_nilai', allNilai);
        loadNilai();
      };

      const currentStudent = getDb('mock_users').find(u => u.id === parseInt(curId));
      const rataRata = nilai.length > 0
        ? (nilai.reduce((sum, n) => sum + (n.nilaiUts + n.nilaiUas)/2, 0) / nilai.length).toFixed(1)
        : '-';

      const getGradeChar = (score) => {
        const s = parseFloat(score);
        if (s >= 85) return 'A';
        if (s >= 75) return 'B';
        if (s >= 65) return 'C';
        if (s >= 50) return 'D';
        return 'E';
      };

      const getKeterangan = (gc) => {
        if (gc === 'A') return 'Sangat Baik (Mumtaz)';
        if (gc === 'B') return 'Baik (Jayyid)';
        if (gc === 'C') return 'Cukup (Maqbul)';
        return 'Kurang';
      };

      return (
        <div className="space-y-6">
          {/* Toolbar */}
          <div className="bg-white p-5 rounded-2xl border border-slate-200 flex justify-between items-center flex-wrap gap-4 no-print shadow-sm">
            <div className="flex flex-wrap items-center gap-3">
              {user.role === 'ADMIN' && (
                <div className="flex flex-col">
                  <label className="text-[9px] font-bold text-slate-400 uppercase mb-1">Santri</label>
                  <select 
                    value={curId} 
                    onChange={(e) => setSelectedStudentId(e.target.value)}
                    className="bg-slate-50 border border-slate-200 rounded-lg px-2.5 py-1.5 text-xs font-bold focus:outline-none"
                  >
                    {users.map(u => <option key={u.id} value={u.id}>{u.nama}</option>)}
                  </select>
                </div>
              )}

                <label className="text-[9px] font-bold text-slate-400 uppercase mb-1">Tahun Ajaran</label>
                <select value={tahun} onChange={(e) => setTahun(e.target.value)} className="bg-slate-50 border border-slate-200 rounded-lg px-2.5 py-1.5 text-xs font-bold">
                  <option value="2025/2026">2025/2026</option>
                  <option value="2026/2027">2026/2027</option>
                </select>
              </div>
              <div className="flex flex-col">
                <label className="text-[9px] font-bold text-slate-400 uppercase mb-1">Semester</label>

                  <option value="GANJIL">GANJIL</option>
                  <option value="GENAP">GENAP</option>
                </select>
              </div>
            </div>

            <div className="flex gap-2">
              {user.role === 'ADMIN' && (
                <button onClick={() => { setModalMode('ADD'); setForm({ mataPelajaran: '', nilaiUts: '', nilaiUas: '' }); setShowModal(true); }} className="bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-xs py-2.5 px-4 rounded-xl flex items-center transition shadow-md shadow-emerald-700/10">

                  <tr className="bg-slate-50 border-b border-slate-200 text-slate-500 font-bold uppercase">

                </thead>
                <tbody className="divide-y divide-slate-100">
                  {nilai.length > 0 ? (
                    nilai.map(n => {
                      const avg = ((n.nilaiUts + n.nilaiUas)/2).toFixed(1);
                      const gc = getGradeChar(avg);

                        <tr key={n.id} className="hover:bg-slate-50/50">
                          <td className="py-2.5 px-3 font-semibold text-slate-850">{n.mataPelajaran}</td>
                          <td className="py-2.5 px-3 text-center">{n.nilaiUts}</td>
                          <td className="py-2.5 px-3 text-center">{n.nilaiUas}</td>
                          <td className="py-2.5 px-3 text-center font-bold text-emerald-800">{avg}</td>
                          <td className="py-2.5 px-3 text-center font-bold">{gc}</td>
                          <td className="py-2.5 px-3 text-slate-500 font-medium">{getKeterangan(gc)}</td>
                          {user.role === 'ADMIN' && (
                            <td className="py-2.5 px-3 text-center">
                              <div className="flex justify-center space-x-1">
                                <button onClick={() => { setModalMode('EDIT'); setEditId(n.id); setForm({ mataPelajaran: n.mataPelajaran, nilaiUts: n.nilaiUts, nilaiUas: n.nilaiUas }); setShowModal(true); }} className="text-emerald-700 hover:bg-slate-150 p-1 rounded">
                                  <Icon name="edit" size={13} />
                                </button>
                                <button onClick={() => handleDelete(n.id)} className="text-rose-600 hover:bg-slate-150 p-1 rounded">
                                  <Icon name="trash-2" size={13} />
                                </button>
                              </div>
                            </td>
                          )}
                        </tr>
                      );
                    })

                    <tr>
                      <td colSpan={user.role === 'ADMIN' ? '7' : '6'} className="py-6 text-center text-slate-400">Belum ada data nilai semester ini.</td>
                    </tr>

                </tbody>
              </table>
            </div>
          </div>

            <div className="text-center border-b-4 border-double border-slate-900 pb-3 mb-4">
              <h1 className="text-base font-bold uppercase tracking-wider">YAYASAN MIFTAHUL HUDA AS-SYADZILI</h1>
              <h2 className="text-lg font-extrabold uppercase mt-0.5">PONDOK PESANTREN MIFTAHUL HUDA AS-SYADZILI</h2>
              <p className="text-[9px] text-slate-500 font-sans mt-0.5">Jl. Raya Pesantren No. 1, Sumberpasir, Pakis, Malang • Telp: (0341) 789012</p>
            </div>
            
            <h3 className="text-center text-sm font-bold underline uppercase tracking-wider mb-4">LAPORAN HASIL EVALUASI BELAJAR (RAPOR)</h3>

            <div className="grid grid-cols-2 gap-4 mb-4 text-[10px] font-sans border border-slate-200 p-3 bg-slate-50 rounded">
              <div>
                <p><strong>Nama Santri:</strong> {currentStudent?.nama}</p>
                <p className="mt-1"><strong>Kelas:</strong> {currentStudent?.kelas || '-'}</p>
              </div>
              <div>
                <p><strong>Tahun Ajaran:</strong> {tahun}</p>
                <p className="mt-1"><strong>Semester:</strong> {sem}</p>

    // --- VIEW: KEAMANAN (SANKSI) ---
    function KeamananView({ user, selectedStudentId, setSelectedStudentId }) {
      const [sanksi, setSanksi] = useState([]);
      const [filterKat, setFilterKat] = useState('');
      
      const [showModal, setShowModal] = useState(false);
      const [modalMode, setModalMode] = useState('ADD');
      const [editId, setEditId] = useState(null);
      const [form, setForm] = useState({ tanggalPelanggaran: new Date().toISOString().split('T')[0], tahun: '2025/2026', deskripsi: '', kategori: 'RINGAN' });

      const users = getDb('mock_users').filter(u => u.role === 'SANTRI' && u.status === 'ACTIVE');
      const curId = user.role === 'ADMIN' ? (selectedStudentId || (users[0]?.id || '')) : user.id;

      useEffect(() => {
        if (user.role === 'ADMIN' && users.length > 0 && !selectedStudentId) {
          setSelectedStudentId(users[0].id);
        }
      }, [users]);

      useEffect(() => {
        if (curId) {
          loadSanksi();
        }
      }, [curId, filterKat]);

      const loadSanksi = () => {
        const allSanksi = getDb('mock_sanksi');
        let filtered = allSanksi.filter(s => s.santriId === parseInt(curId));
        if (filterKat) {
          filtered = filtered.filter(s => s.kategori === filterKat);
        }
        setSanksi(filtered);
      };

      const handleSave = (e) => {
        e.preventDefault();
        const allSanksi = getDb('mock_sanksi');
        if (modalMode === 'ADD') {
          allSanksi.push({
            id: Date.now(),
            santriId: parseInt(curId),
            ...form
          });
        } else {
          const idx = allSanksi.findIndex(s => s.id === editId);
          if (idx !== -1) {
            allSanksi[idx] = { ...allSanksi[idx], ...form };
          }
        }
        saveDb('mock_sanksi', allSanksi);
        setShowModal(false);
        loadSanksi();
      };

      const handleDelete = (id) => {
        if (!confirm('Hapus catatan sanksi ini?')) return;
        const allSanksi = getDb('mock_sanksi').filter(s => s.id !== id);
        saveDb('mock_sanksi', allSanksi);
        loadSanksi();
      };

      const currentStudent = getDb('mock_users').find(u => u.id === parseInt(curId));

      return (
        <div className="space-y-6">
          <div className="bg-white p-5 rounded-2xl border border-slate-200 flex justify-between items-center flex-wrap gap-4 shadow-sm">
            <div className="flex flex-wrap items-center gap-3">
              {user.role === 'ADMIN' && (
                <div className="flex flex-col">
                  <label className="text-[9px] font-bold text-slate-400 uppercase mb-1">Santri</label>
                  <select value={curId} onChange={(e) => setSelectedStudentId(e.target.value)} className="bg-slate-50 border border-slate-200 rounded-lg px-2.5 py-1.5 text-xs font-bold">
                    {users.map(u => <option key={u.id} value={u.id}>{u.nama}</option>)}
                  </select>
                </div>
              )}
              <div className="flex flex-col">
                <label className="text-[9px] font-bold text-slate-400 uppercase mb-1">Filter Kategori</label>
                <select value={filterKat} onChange={(e) => setFilterKat(e.target.value)} className="bg-slate-50 border border-slate-200 rounded-lg px-2.5 py-1.5 text-xs font-bold">
                  <option value="">Semua Tingkat</option>
                  <option value="RINGAN">RINGAN</option>
                  <option value="SEDANG">SEDANG</option>
                  <option value="BERAT">BERAT</option>
                </select>
              </div>
            </div>
            {user.role === 'ADMIN' && (
              <button onClick={() => { setModalMode('ADD'); setForm({ tanggalPelanggaran: new Date().toISOString().split('T')[0], tahun: '2025/2026', deskripsi: '', kategori: 'RINGAN' }); setShowModal(true); }} className="bg-rose-600 hover:bg-rose-700 text-white font-bold text-xs py-2.5 px-4 rounded-xl flex items-center transition shadow shadow-rose-650/10">
                <Icon name="plus" size={14} className="mr-1" /> Catat Pelanggaran
              </button>
            )}
          </div>

          <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
            <h3 className="text-base font-bold text-slate-800 font-serif mb-4">🛡️ Buku Catatan Kedisiplinan: {currentStudent?.nama}</h3>
            
            <div className="overflow-x-auto">
              <table className="w-full text-left text-xs">
                <thead>
                  <tr className="bg-slate-50 border-b border-slate-200 text-slate-500 font-bold uppercase">
                    <th className="py-2.5 px-3">Tanggal</th>
                    <th className="py-2.5 px-3">Tingkat</th>
                    <th className="py-2.5 px-3">Deskripsi Tindakan</th>
                    {user.role === 'ADMIN' && <th className="py-2.5 px-3 text-center">Aksi</th>}
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-100">
                  {sanksi.length > 0 ? (
                    sanksi.map(s => (
                      <tr key={s.id} className="hover:bg-slate-50/50">
                        <td className="py-2.5 px-3 text-slate-600 font-medium">{s.tanggalPelanggaran}</td>
                        <td className="py-2.5 px-3">
                          <span className={`inline-block px-2 py-0.25 rounded text-[8px] font-bold border ${
                            s.kategori === 'RINGAN' ? 'bg-amber-100 text-amber-800 border-amber-250' :
                            s.kategori === 'SEDANG' ? 'bg-orange-100 text-orange-800 border-orange-250' :
                            'bg-rose-100 text-rose-800 border-rose-250'
                          }`}>
                            {s.kategori}
                          </span>
                        </td>
                        <td className="py-2.5 px-3 text-slate-700 leading-relaxed">{s.deskripsi}</td>
                        {user.role === 'ADMIN' && (
                          <td className="py-2.5 px-3 text-center">
                            <div className="flex justify-center space-x-1">
                              <button onClick={() => { setModalMode('EDIT'); setEditId(s.id); setForm({ tanggalPelanggaran: s.tanggalPelanggaran, tahun: s.tahun, deskripsi: s.deskripsi, kategori: s.kategori }); setShowModal(true); }} className="text-emerald-700 hover:bg-slate-150 p-1 rounded">
                                <Icon name="edit" size={13} />
                              </button>
                              <button onClick={() => handleDelete(s.id)} className="text-rose-600 hover:bg-slate-150 p-1 rounded">
                                <Icon name="trash-2" size={13} />
                              </button>
                            </div>
                          </td>
                        )}
                      </tr>
                    ))
                  ) : (
                    <tr>
                      <td colSpan={user.role === 'ADMIN' ? '4' : '3'} className="py-6 text-center text-slate-400">Tidak ada catatan pelanggaran disiplin.</td>
                    </tr>
                  )}
                </tbody>
              </table>
            </div>
          </div>

          {/* Modal */}
          {showModal && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden">
                <div className="p-4 bg-rose-950 text-white font-bold text-sm flex justify-between items-center">
                  <span>{modalMode === 'ADD' ? 'Catat Pelanggaran' : 'Ubah Catatan'}</span>
                  <button onClick={() => setShowModal(false)}>✕</button>
                </div>
                <form onSubmit={handleSave} className="p-5 space-y-4">
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-[9px] font-bold text-slate-500 uppercase mb-1">Tanggal</label>
                      <input type="date" className="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-xs" value={form.tanggalPelanggaran} onChange={(e) => setForm({ ...form, tanggalPelanggaran: e.target.value })} required />
                    </div>
                    <div>
                      <label className="block text-[9px] font-bold text-slate-500 uppercase mb-1">Tingkat</label>
                      <select value={form.kategori} onChange={(e) => setForm({ ...form, kategori: e.target.value })} className="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-xs">
                        <option value="RINGAN">RINGAN</option>
                        <option value="SEDANG">SEDANG</option>
                        <option value="BERAT">BERAT</option>
                      </select>
                    </div>
                  </div>
                  <div>
                    <label className="block text-[9px] font-bold text-slate-500 uppercase mb-1">Deskripsi Tindakan</label>
                    <textarea rows="3" className="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-xs resize-none" value={form.deskripsi} onChange={(e) => setForm({ ...form, deskripsi: e.target.value })} required></textarea>
                  </div>
                  <div className="flex justify-end space-x-2 pt-2">
                    <button type="button" onClick={() => setShowModal(false)} className="px-3 py-1.5 border border-slate-200 text-slate-500 rounded text-xs">Batal</button>
                    <button type="submit" className="px-3 py-1.5 bg-rose-600 text-white rounded text-xs font-bold">Simpan</button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    // --- VIEW: KEUANGAN (BENDAHARA) ---
    function KeuanganView({ user, selectedStudentId, setSelectedStudentId }) {
      const [payments, setPayments] = useState([]);
      const [year, setYear] = useState(2026);
      const [printMode, setPrintMode] = useState('RECAP'); // 'RECAP' or 'RECIP'
      const [activeRecip, setActiveRecip] = useState(null);

      const users = getDb('mock_users').filter(u => u.role === 'SANTRI' && u.status === 'ACTIVE');
      const curId = user.role === 'ADMIN' ? (selectedStudentId || (users[0]?.id || '')) : user.id;

      useEffect(() => {
        if (user.role === 'ADMIN' && users.length > 0 && !selectedStudentId) {
          setSelectedStudentId(users[0].id);
        }
      }, [users]);

      useEffect(() => {
        if (curId) {
          loadPayments();
        }
      }, [curId, year]);

      const loadPayments = () => {
        const allPay = getDb('mock_pembayaran');
        const studentPays = allPay.filter(p => p.santriId === parseInt(curId) && p.tahun === year);

        // Generate 12 months status
        const list = [];
        for (let m = 1; m <= 12; m++) {
          const dbItem = studentPays.find(p => p.bulan === m);
          if (dbItem) {
            list.push(dbItem);
          } else {
            list.push({
              id: null,
              santriId: parseInt(curId),
              bulan: m,
              tahun: year,
              status: 'BELUM_BAYAR',
              tanggalBayar: null,
              jumlah: 250000
            });
          }
        }
        setPayments(list);
      };

      const toggleStatus = (bulan, currentStatus) => {
        const allPay = getDb('mock_pembayaran');
        const nextStatus = currentStatus === 'LUNAS' ? 'BELUM_BAYAR' : 'LUNAS';
        
        const idx = allPay.findIndex(p => p.santriId === parseInt(curId) && p.bulan === bulan && p.tahun === year);
        const record = {
          id: idx !== -1 ? allPay[idx].id : Date.now(),
          santriId: parseInt(curId),
          bulan,
          tahun: year,
          status: nextStatus,
          tanggalBayar: nextStatus === 'LUNAS' ? new Date().toISOString().split('T')[0] : null,
          jumlah: 250000
        };

        if (idx !== -1) {
          allPay[idx] = record;
        } else {
          allPay.push(record);
        }
        saveDb('mock_pembayaran', allPay);
        loadPayments();
      };

      const getNamaBulan = (num) => {
        const list = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
        return list[num - 1];
      };

      const currentStudent = getDb('mock_users').find(u => u.id === parseInt(curId));
      const totalTerbayar = payments.filter(p => p.status === 'LUNAS').reduce((sum, p) => sum + p.jumlah, 0);
      const totalTunggakan = payments.filter(p => p.status !== 'LUNAS').reduce((sum, p) => sum + p.jumlah, 0);

      const triggerReceipt = (p) => {
        setPrintMode('RECIP');
        setActiveRecip({
          ...p,
          invoiceNo: `INV/SPP/${year}/${p.bulan.toString().padStart(2, '0')}/PP-${curId}`
        });
        setTimeout(() => window.print(), 100);
      };

      const triggerRecap = () => {
        setPrintMode('RECAP');
        setTimeout(() => window.print(), 100);
      };

      return (
        <div className="space-y-6">
          {/* Toolbar */}
          <div className="bg-white p-5 rounded-2xl border border-slate-200 flex justify-between items-center flex-wrap gap-4 shadow-sm no-print">
            <div className="flex flex-wrap items-center gap-3">
              {user.role === 'ADMIN' && (
                <div className="flex flex-col">
                  <label className="text-[9px] font-bold text-slate-400 uppercase mb-1">Santri</label>
                  <select value={curId} onChange={(e) => setSelectedStudentId(e.target.value)} className="bg-slate-50 border border-slate-200 rounded-lg px-2.5 py-1.5 text-xs font-bold">
                    {users.map(u => <option key={u.id} value={u.id}>{u.nama}</option>)}
                  </select>
                </div>
              )}
              <div className="flex flex-col">
                <label className="text-[9px] font-bold text-slate-400 uppercase mb-1">Tahun Buku Syariah</label>
                <select value={year} onChange={(e) => setYear(parseInt(e.target.value))} className="bg-slate-50 border border-slate-200 rounded-lg px-2.5 py-1.5 text-xs font-bold">
                  <option value="2026">2026</option>
                  <option value="2025">2025</option>
                </select>
              </div>
            </div>
            <button onClick={triggerRecap} className="bg-slate-800 hover:bg-slate-900 text-white font-bold text-xs py-2.5 px-4 rounded-xl flex items-center transition shadow">
              <Icon name="printer" size={14} className="mr-1" /> Laporan Rekap Syariah
            </button>
          </div>

          {/* Web Summary */}
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4 no-print">
            <div className="bg-white p-5 rounded-2xl border border-slate-200 flex items-center justify-between shadow-sm">
              <div>
                <p className="text-[9px] font-bold text-slate-400 uppercase">Total Dibayar</p>
                <h3 className="font-extrabold text-emerald-800 text-xl mt-0.5">Rp {totalTerbayar.toLocaleString('id-ID')}</h3>
              </div>
              <div className="p-3.5 bg-emerald-50 rounded-2xl text-emerald-700"><Icon name="check-circle" size={24} /></div>
            </div>
            <div className="bg-white p-5 rounded-2xl border border-slate-200 flex items-center justify-between shadow-sm">
              <div>
                <p className="text-[9px] font-bold text-slate-400 uppercase">Akumulasi Tunggakan</p>
                <h3 className={`font-extrabold text-xl mt-0.5 ${totalTunggakan > 0 ? 'text-rose-600' : 'text-emerald-700'}`}>
                  Rp {totalTunggakan.toLocaleString('id-ID')}
                </h3>
              </div>
              <div className="p-3.5 bg-rose-50 rounded-2xl text-rose-700"><Icon name="x-circle" size={24} /></div>
            </div>
          </div>

          {/* Months Grid */}
          <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm no-print">
            <h3 className="text-base font-bold text-slate-800 font-serif mb-4">💳 Lembar Buku Syariah: {currentStudent?.nama}</h3>
            
            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
              {payments.map(p => {
                const paid = p.status === 'LUNAS';
                return (
                  <div key={p.bulan} className={`border rounded-xl p-4 flex flex-col justify-between h-36 ${paid ? 'bg-emerald-50/20 border-emerald-250 shadow-sm' : 'border-slate-200'}`}>
                    <div className="flex justify-between items-start">
                      <div>
                        <h4 className="font-bold text-slate-800 text-xs">{getNamaBulan(p.bulan)}</h4>
                        <p className="text-[10px] text-slate-400 font-bold mt-1">Rp 250.000</p>
                      </div>
                      <span className={`inline-block px-2 py-0.25 rounded text-[8px] font-bold border uppercase ${
                        paid ? 'bg-emerald-100 text-emerald-800 border-emerald-200' : 'bg-rose-100 text-rose-800 border-rose-200'
                      }`}>
                        {p.status}
                      </span>
                    </div>

                    <div className="mt-3 pt-2.5 border-t border-slate-100 flex items-center justify-between">
                      {user.role === 'ADMIN' ? (
                        <button onClick={() => toggleStatus(p.bulan, p.status)} className={`flex-1 py-1 px-2 rounded font-bold text-[9px] transition ${
                          paid ? 'bg-slate-100 hover:bg-slate-200 text-slate-650' : 'bg-emerald-600 hover:bg-emerald-700 text-white shadow-sm'
                        }`}>
                          {paid ? 'Batal Bayar' : 'Tandai Lunas'}
                        </button>
                      ) : (
                        <span className="text-[9px] text-slate-400">
                          {paid ? `Tanggal: ${p.tanggalBayar}` : 'Belum Lunas'}
                        </span>
                      )}

                      {paid && (
                        <button onClick={() => triggerReceipt(p)} className="p-1 hover:bg-slate-150 rounded text-slate-600 border border-slate-200 ml-1.5" title="Kwitansi Bukti">
                          <Icon name="printer" size={10} />
                        </button>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* PRINT AREA: KWITANSI TUNGGAL */}
          {printMode === 'RECIP' && activeRecip && (
            <div className="hidden print:block print-area bg-white p-6 font-serif max-w-xl mx-auto border-2 border-slate-800 rounded-lg">
              <div className="flex justify-between items-start border-b border-slate-400 pb-2 mb-3">
                <div>
                  <h2 className="text-sm font-bold uppercase text-emerald-950">PONDOK PESANTREN MIFTAHUL HUDA AS-SYADZILI</h2>
                  <p className="text-[8px] text-slate-500 font-sans mt-0.5">Jl. Raya Pesantren No. 1, Sumberpasir, Pakis, Malang</p>
                </div>
                <div className="text-right">
                  <span className="bg-emerald-900/10 text-emerald-900 border border-emerald-900/20 text-[8px] font-bold px-1.5 py-0.25 rounded font-sans uppercase">BUKTI RESMI</span>
                  <p className="text-[9px] font-mono text-slate-600 mt-1">{activeRecip.invoiceNo}</p>
                </div>
              </div>
              <h3 className="text-center text-xs font-bold underline uppercase tracking-wider mb-4">KWITANSI TANDA TERIMA</h3>
              <div className="space-y-2 text-[10px] font-sans">
                <p><strong>Telah Diterima Dari :</strong> {currentStudent?.namaWali || 'Orang Tua'} / {currentStudent?.nama}</p>
                <p><strong>Uang Sejumlah :</strong> Rp 250.000</p>
                <p><strong>Terbilang :</strong> "Dua Ratus Lima Puluh Ribu Rupiah"</p>
                <p><strong>Untuk Pembayaran :</strong> Syariah Bulanan - Bulan {getNamaBulan(activeRecip.bulan)} Tahun {activeRecip.tahun}</p>
              </div>
              <div className="mt-6 flex justify-between items-center text-[10px]">
                <div className="border border-emerald-600 bg-emerald-50 px-3 py-1 font-bold text-emerald-700 rounded text-xs">LUNAS</div>
                <div className="text-center">
                  <p className="text-slate-450">Malang, {new Date(activeRecip.tanggalBayar).toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' })}</p>
                  <p className="font-bold mt-1">Bendahara Pesantren</p>
                  <div className="h-10"></div>
                  <p className="underline font-bold">Ustadz Pembina Bendahara</p>
                </div>
              </div>
            </div>
          )}

          {/* PRINT AREA: REKAP TAHUNAN */}
          {printMode === 'RECAP' && (
            <div className="hidden print:block print-area bg-white p-8 font-serif leading-relaxed text-xs">
              <div className="text-center border-b-4 border-double border-slate-900 pb-3 mb-4">
                <h1 className="text-base font-bold uppercase tracking-wider">YAYASAN MIFTAHUL HUDA AS-SYADZILI</h1>
                <h2 className="text-lg font-extrabold uppercase mt-0.5">PONDOK PESANTREN MIFTAHUL HUDA AS-SYADZILI</h2>
                <p className="text-[9px] text-slate-500 font-sans mt-0.5">Jl. Raya Pesantren No. 1, Sumberpasir, Pakis, Malang</p>
              </div>

              <h3 className="text-center text-xs font-bold underline uppercase tracking-wider mb-4">LAPORAN REKAP PEMBAYARAN SYARIAH TAHUN {year}</h3>
              
              <div className="grid grid-cols-2 gap-4 mb-4 text-[10px] font-sans border border-slate-200 p-3 bg-slate-50 rounded">
                <div>
                  <p><strong>Nama Santri:</strong> {currentStudent?.nama}</p>
                  <p className="mt-1"><strong>Kelas:</strong> {currentStudent?.kelas || '-'}</p>
                </div>
                <div>
                  <p><strong>Total Terbayar:</strong> Rp {totalTerbayar.toLocaleString('id-ID')}</p>
                  <p className="mt-1"><strong>Total Tunggakan:</strong> Rp {totalTunggakan.toLocaleString('id-ID')}</p>
                </div>
              </div>

              <table className="w-full border-collapse border border-slate-900 text-[10px] mb-6">
                <thead>
                  <tr className="bg-slate-100">
                    <th className="border border-slate-900 py-1.5 px-2 text-center w-12">Bulan</th>
                    <th className="border border-slate-900 py-1.5 px-2 text-left">Deskripsi Iuran Syariah</th>
                    <th className="border border-slate-900 py-1.5 px-2 text-center w-24">Nominal</th>
                    <th className="border border-slate-900 py-1.5 px-2 text-center w-28">Tanggal Bayar</th>
                    <th className="border border-slate-900 py-1.5 px-2 text-center w-24">Status</th>
                  </tr>
                </thead>
                <tbody>
                  {payments.map(p => {
                    const paid = p.status === 'LUNAS';
                    return (
                      <tr key={p.bulan}>
                        <td className="border border-slate-900 py-1 px-2 text-center">{p.bulan}</td>
                        <td className="border border-slate-900 py-1 px-2 font-semibold">Syariah Bulanan Bulan {getNamaBulan(p.bulan)}</td>
                        <td className="border border-slate-900 py-1 px-2 text-center">Rp 250.000</td>
                        <td className="border border-slate-900 py-1 px-2 text-center">{paid ? p.tanggalBayar : '-'}</td>
                        <td className="border border-slate-900 py-1 px-2 text-center font-bold">
                          <span className={paid ? 'text-emerald-700' : 'text-rose-600'}>{paid ? 'LUNAS' : 'BELUM BAYAR'}</span>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>

              <div className="grid grid-cols-2 text-center text-[10px] mt-10">
                <div>
                  <p>Mengesahkan,</p>
                  <p className="font-bold">Kepala Pengasuh</p>
                  <div className="h-12"></div>
                  <p className="underline font-bold">RIFKI AHMAD DZULFIKRI</p>
                </div>
                <div>
                  <p>Dibuat Oleh,</p>
                  <p className="font-bold">Bendahara Pesantren</p>
                  <div className="h-12"></div>
                  <p className="underline font-bold">Ustadz Pembina Bendahara</p>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // --- VIEW: PROFIL ---
    function ProfilView({ user, targetUserId, clearTargetId }) {
      const [profile, setProfile] = useState(null);
      const [tab, setTab] = useState('pribadi'); // 'pribadi', 'akademik', 'keamanan', 'keuangan'
      
      const [pwdForm, setPwdForm] = useState({ oldPwd: '', newPwd: '', confPwd: '' });
      const [pwdSuccess, setPwdSuccess] = useState('');
      const [pwdError, setPwdError] = useState('');

      useEffect(() => {
        loadProfile();
      }, [targetUserId]);

      const loadProfile = () => {
        const users = getDb('mock_users');
        const found = users.find(u => u.id === parseInt(targetUserId));
        if (!found) return;

        const nil = getDb('mock_nilai').filter(n => n.santriId === found.id);
        const san = getDb('mock_sanksi').filter(s => s.santriId === found.id);
        
        const pay = getDb('mock_pembayaran').filter(p => p.santriId === found.id && p.tahun === 2026);
        const paidCount = pay.filter(p => p.status === 'LUNAS').length;
        const tunggakan = (12 - paidCount) * 250000;

        setProfile({
          user: found,
          akademik: nil,
          keamanan: san,
          keuangan: {
            tunggakan,
            payments: pay
          }
        });
      };

      const handleUpdatePwd = (e) => {
        e.preventDefault();
        setPwdError('');
        setPwdSuccess('');
        const { oldPwd, newPwd, confPwd } = pwdForm;

        if (newPwd !== confPwd) {
          setPwdError('Konfirmasi password tidak cocok');
          return;
        }

        const users = getDb('mock_users');
        const idx = users.findIndex(u => u.id === user.id);
        if (idx !== -1) {
          if (users[idx].password !== oldPwd) {
            setPwdError('Kata sandi lama salah');
            return;
          }
          users[idx].password = newPwd;
          saveDb('mock_users', users);
          setPwdSuccess('Kata sandi berhasil diperbarui!');
          setPwdForm({ oldPwd: '', newPwd: '', confPwd: '' });
        }
      };

      if (!profile) return null;

      const isTargetAdmin = profile.user.role === 'ADMIN';

      return (
        <div className="space-y-6">
          {/* Header Card */}
          <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex items-center space-x-4 flex-wrap gap-4 justify-between">
            <div className="flex items-center space-x-4">
              <div className="w-16 h-16 rounded-full bg-emerald-600 text-white flex items-center justify-center font-bold text-2xl border uppercase">
                {profile.user.nama.charAt(0)}
              </div>
              <div>
                <h3 className="font-bold text-slate-800 text-base font-serif">{profile.user.nama}</h3>
                <p className="text-xs text-slate-500">{profile.user.email}</p>
                <div className="mt-1.5 flex gap-1.5 text-[9px] font-bold">
                  <span className="bg-emerald-100 text-emerald-800 px-2 py-0.5 rounded uppercase border border-emerald-250">
                    {profile.user.role === 'ADMIN' ? 'Pengurus' : `Santri (${profile.user.kelas || '-'})`}
                  </span>
                  <span className="bg-slate-100 text-slate-600 px-2 py-0.5 rounded border">Status: {profile.user.status}</span>
                </div>
              </div>
            </div>
            
            {!isTargetAdmin && user.role === 'ADMIN' && (
              <button onClick={() => { clearTargetId(); setView('dashboard'); }} className="text-xs bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-2 px-3 rounded-lg border">
                Kembali Beranda
              </button>
            )}
          </div>

          {/* Santri Aggregate tabs */}
          {!isTargetAdmin ? (
            <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
              {/* Sidebar Tabs */}
              <div className="lg:col-span-1 bg-white p-3 rounded-2xl border border-slate-200 flex flex-row lg:flex-col overflow-x-auto gap-1 text-[10px] font-bold">
                <button onClick={() => setTab('pribadi')} className={`flex-1 lg:flex-none text-left px-3.5 py-2.5 rounded-lg whitespace-nowrap ${tab === 'pribadi' ? 'bg-emerald-650 text-white shadow' : 'text-slate-600 hover:bg-slate-50'}`}>Biodata Diri</button>
                <button onClick={() => setTab('akademik')} className={`flex-1 lg:flex-none text-left px-3.5 py-2.5 rounded-lg whitespace-nowrap ${tab === 'akademik' ? 'bg-emerald-650 text-white shadow' : 'text-slate-600 hover:bg-slate-50'}`}>Nilai Rapor</button>
                <button onClick={() => setTab('keamanan')} className={`flex-1 lg:flex-none text-left px-3.5 py-2.5 rounded-lg whitespace-nowrap ${tab === 'keamanan' ? 'bg-emerald-650 text-white shadow' : 'text-slate-600 hover:bg-slate-50'}`}>Kedisiplinan</button>
                <button onClick={() => setTab('keuangan')} className={`flex-1 lg:flex-none text-left px-3.5 py-2.5 rounded-lg whitespace-nowrap ${tab === 'keuangan' ? 'bg-emerald-650 text-white shadow' : 'text-slate-600 hover:bg-slate-50'}`}>Buku Syariah</button>
              </div>

              {/* Contents */}
              <div className="lg:col-span-3 bg-white p-6 rounded-2xl border border-slate-200 min-h-[250px]">
                {tab === 'pribadi' && (
                  <div className="space-y-5 text-xs">
                    <h4 className="font-bold text-slate-800 font-serif border-b pb-2">📋 Biodata Santri</h4>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                      <div>
                        <p className="text-[9px] font-bold text-slate-400 uppercase">Nama Lengkap</p>
                        <p className="font-bold text-slate-800">{profile.user.nama}</p>
                      </div>
                      <div>
                        <p className="text-[9px] font-bold text-slate-400 uppercase">Email Akun</p>
                        <p className="font-semibold text-slate-800">{profile.user.email}</p>
                      </div>
                      <div>
                        <p className="text-[9px] font-bold text-slate-400 uppercase">Nama Wali</p>
                        <p className="font-bold text-slate-800">{profile.user.namaWali || '-'}</p>
                      </div>
                      <div>
                        <p className="text-[9px] font-bold text-slate-400 uppercase">No. HP HP</p>
                        <p className="font-semibold text-slate-800">{profile.user.noHp}</p>
                      </div>
                      <div className="sm:col-span-2">
                        <p className="text-[9px] font-bold text-slate-400 uppercase">Alamat Rumah</p>
                        <p className="font-semibold text-slate-800">{profile.user.alamat}</p>
                      </div>
                    </div>

                    {targetUserId === user.id && (
                      <div className="border-t border-slate-100 pt-5 space-y-4">
                        <h4 className="font-bold text-slate-800 font-serif">🔑 Ganti Kata Sandi</h4>
                        {pwdError && <p className="text-rose-600 text-[10px] font-bold">⚠️ {pwdError}</p>}
                        {pwdSuccess && <p className="text-emerald-700 text-[10px] font-bold">✓ {pwdSuccess}</p>}
                        <form onSubmit={handleUpdatePwd} className="grid grid-cols-1 sm:grid-cols-3 gap-2">
                          <input type="password" placeholder="Sandi Lama" value={pwdForm.oldPwd} onChange={(e) => setPwdForm({ ...pwdForm, oldPwd: e.target.value })} className="bg-slate-50 border p-2 rounded text-xs focus:border-emerald-500 outline-none" required />
                          <input type="password" placeholder="Sandi Baru" value={pwdForm.newPwd} onChange={(e) => setPwdForm({ ...pwdForm, newPwd: e.target.value })} className="bg-slate-50 border p-2 rounded text-xs focus:border-emerald-500 outline-none" required />
                          <div className="flex gap-2">
                            <input type="password" placeholder="Konfirmasi" value={pwdForm.confPwd} onChange={(e) => setPwdForm({ ...pwdForm, confPwd: e.target.value })} className="flex-1 bg-slate-50 border p-2 rounded text-xs focus:border-emerald-500 outline-none" required />
                            <button type="submit" className="bg-slate-800 text-white px-3 text-[10px] rounded font-bold">Update</button>
                          </div>
                        </form>
                      </div>
                    )}
                  </div>
                )}

                {tab === 'akademik' && (
                  <div className="space-y-4">
                    <h4 className="font-bold text-slate-800 font-serif border-b pb-2">📚 Laporan Studi Nilai</h4>
                    <table className="w-full text-left text-xs">
                      <thead>
                        <tr className="bg-slate-50 border-b text-slate-500 font-bold uppercase">
                          <th className="py-2 px-3">Tahun</th>
                          <th className="py-2 px-3">Semester</th>
                          <th className="py-2 px-3">Mata Pelajaran</th>
                          <th className="py-2 px-3 text-center">Rata-Rata</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-100">
                        {profile.akademik.length > 0 ? (
                          profile.akademik.map(n => (
                            <tr key={n.id}>
                              <td className="py-2 px-3 font-semibold text-slate-700">{n.tahunAjaran}</td>
                              <td className="py-2 px-3">{n.semester}</td>
                              <td className="py-2 px-3 font-medium">{n.mataPelajaran}</td>
                              <td className="py-2 px-3 text-center font-bold text-emerald-800">{((n.nilaiUts+n.nilaiUas)/2).toFixed(1)}</td>
                            </tr>
                          ))
                        ) : (
                          <tr><td colSpan="4" className="py-4 text-center text-slate-400">Belum ada riwayat nilai.</td></tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                )}

                {tab === 'keamanan' && (
                  <div className="space-y-4">
                    <h4 className="font-bold text-slate-800 font-serif border-b pb-2">🛡️ Pelanggaran Disiplin</h4>
                    <div className="space-y-2">
                      {profile.keamanan.length > 0 ? (
                        profile.keamanan.map(s => (
                          <div key={s.id} className="bg-slate-50 border border-slate-150 p-3 rounded-lg text-xs leading-relaxed">
                            <span className="inline-block px-1.5 py-0.25 text-[8px] font-bold bg-amber-100 border border-amber-250 text-amber-800 rounded mb-1">{s.kategori}</span>
                            <p className="font-bold text-slate-800">{s.tanggalPelanggaran}</p>
                            <p className="text-slate-600 mt-1">{s.deskripsi}</p>
                          </div>
                        ))
                      ) : (
                        <div className="text-center py-6 text-slate-400">Alhamdulillah, bersih dari sanksi.</div>
                      )}
                    </div>
                  </div>
                )}

                {tab === 'keuangan' && (
                  <div className="space-y-4">
                    <h4 className="font-bold text-slate-800 font-serif border-b pb-2">💳 Tagihan Syariah Bulanan (2026)</h4>
                    <div className="p-3.5 bg-rose-50 border border-rose-100 rounded-lg flex justify-between items-center text-xs">
                      <div>
                        <span className="font-bold text-rose-800">Tunggakan Syariah Terhitung</span>
                        <p className="text-[10px] text-slate-400">Seluruh bulan belum terbayar lunas</p>
                      </div>
                      <h4 className="font-extrabold text-rose-600">Rp {profile.keuangan.tunggakan.toLocaleString('id-ID')}</h4>
                    </div>
                  </div>
                )}
              </div>
            </div>
          ) : (
            <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm text-xs">
              <h4 className="font-bold text-slate-800 font-serif border-b pb-2 flex items-center"><Icon name="key" className="mr-1.5 text-amber-500" /> Detail Admin & Akun Pengurus</h4>
              <div className="mt-4 grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                  <p className="text-[9px] font-bold text-slate-400 uppercase">Nama Lengkap</p>
                  <p className="font-bold text-slate-800 mt-0.5">{profile.user.nama}</p>
                </div>
                <div>
                  <p className="text-[9px] font-bold text-slate-400 uppercase">Tingkat Akses</p>
                  <p className="font-bold text-emerald-800 mt-0.5">ADMINISTRATOR</p>
                </div>
                <div>
                  <p className="text-[9px] font-bold text-slate-400 uppercase">Email Akun</p>
                  <p className="font-semibold text-slate-800 mt-0.5">{profile.user.email}</p>
                </div>
                <div>
                  <p className="text-[9px] font-bold text-slate-400 uppercase">No. Telepon / WA</p>
                  <p className="font-semibold text-slate-800 mt-0.5">{profile.user.noHp || '-'}</p>
                </div>
                <div className="sm:col-span-2">
                  <p className="text-[9px] font-bold text-slate-400 uppercase">Alamat Instansi/Rumah</p>
                  <p className="font-semibold text-slate-800 mt-0.5">{profile.user.alamat || '-'}</p>
                </div>
              </div>

              {targetUserId === user.id && (
                <div className="border-t border-slate-100 pt-5 mt-6 max-w-md">
                  <h4 className="font-bold text-slate-800 font-serif mb-3">🔑 Ganti Kata Sandi Akun</h4>
                  {pwdError && <p className="text-rose-600 font-bold mb-2">⚠️ {pwdError}</p>}
                  {pwdSuccess && <p className="text-emerald-700 font-bold mb-2">✓ {pwdSuccess}</p>}
                  <form onSubmit={handleUpdatePwd} className="space-y-3">
                    <input type="password" placeholder="Sandi Lama" value={pwdForm.oldPwd} onChange={(e) => setPwdForm({ ...pwdForm, oldPwd: e.target.value })} className="w-full bg-slate-50 border p-2.5 rounded text-xs focus:border-emerald-500 outline-none" required />
                    <input type="password" placeholder="Sandi Baru" value={pwdForm.newPwd} onChange={(e) => setPwdForm({ ...pwdForm, newPwd: e.target.value })} className="w-full bg-slate-50 border p-2.5 rounded text-xs focus:border-emerald-500 outline-none" required />
                    <div className="flex gap-2">
                      <input type="password" placeholder="Konfirmasi" value={pwdForm.confPwd} onChange={(e) => setPwdForm({ ...pwdForm, confPwd: e.target.value })} className="flex-1 bg-slate-50 border p-2.5 rounded text-xs focus:border-emerald-500 outline-none" required />
                      <button type="submit" className="bg-slate-800 text-white px-4 rounded font-bold">Update</button>
                    </div>
                  </form>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // Mount to DOM
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
